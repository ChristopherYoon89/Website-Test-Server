{% extends "blog/base.html" %}
{% block content %}

<h1 class="col-lgrey">Blog</h1>
<hr class="border-col-grey">

{% for post in blog_posts %}
    <article style="margin-top: 45px;">
      <div>
        <h4><a class="url-td" href="{% url 'blog-detail' post.slug %}">{{ post.title }}</a></h4>
          <div class="article-metadata">
            <a class="mr-2" href="#">{{ post.author }}</a>
            <small class="text-muted">{{ post.date_posted | date:"F j, Y" }}</small>
          </div>
          <p>{{ post.snippet | safe }}</p>
        <p><a class="read-more-notes col-lgrey" href="{% url 'blog-detail' post.slug %}">Read More </a></p>
      </div>
  </article>
{% endfor %}

{% endblock content %}
