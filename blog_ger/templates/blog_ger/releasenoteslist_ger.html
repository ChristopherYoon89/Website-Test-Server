{% extends "blog_ger/base_ger.html" %}
{% block content %}

<h1 class="col-lgrey">Release Notes</h1>
<hr class="border-col-grey">

{% for post in release_notes %}
  <article style="margin-top: 45px;">
    <div>
      <h4><a class="url-td" href="{% url 'release-note-detail-ger' post.slug %}">{{ post.title }}</a></h4>
        <div class="article-metadata">
          <a class="mr-2" href="#">{{ post.author }}</a>
          <small class="text-muted">{{ post.date_posted | date:"F j, Y" }}</small>
        </div>
        <p>{{ post.snippet | safe }}</p>
      <p><a class="read-more-notes col-lgrey" href="{% url 'release-note-detail-ger' post.slug %}">Mehr lesen </a></p>
    </div>
  </article>
{% endfor %}

{% endblock content %}
